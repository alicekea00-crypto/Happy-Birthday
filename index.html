<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Radha</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Coiny&family=Dancing+Script:wght@700&display=swap');
    
    :root { --color-pink: #feecea; --color-text-pink: #ff7882; }
    * { padding: 0; margin: 0; box-sizing: border-box; }
    
    body { height: 100vh; background-color: var(--color-pink); overflow: hidden; font-family: 'Coiny', cursive; }
    #wrapper { height: 100%; background-image: radial-gradient(#fff 20%, transparent 20%); background-size: 40px 40px; position: relative; }
    
    /* Decoration Assets */
    .decorate-top { position: absolute; top: 0; width: 100%; z-index: 2; pointer-events: none; }
    .hat { position: absolute; top: -65px; left: -25px; transform: rotate(-15deg); width: clamp(80px, 10vw, 120px); z-index: 10; }

    .main-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; z-index: 5; position: relative; padding: 20px; }
    @media (min-width: 900px) { .main-container { flex-direction: row; justify-content: space-evenly; } }

    /* Proper Bounce Animation */
    .happy span, .birthday span, .name-radha span { 
        display: inline-block; opacity: 0; transform: translateY(-120px); 
        animation: dropBounce 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        text-shadow: 4px 4px 0px #000; 
    }
    .happy span { color: #fff; font-size: clamp(2.5rem, 7vw, 4.5rem); }
    .birthday span { color: var(--color-text-pink); font-size: clamp(2.5rem, 7vw, 4.5rem); }
    .name-radha span { color: #FF1493; font-size: clamp(4rem, 11vw, 6.5rem); text-shadow: 4px 4px 0px #fff; }
    
    @keyframes dropBounce { to { opacity: 1; transform: translateY(0); } }

    /* Photo & Floating Balloons */
    .image-wrap { position: relative; margin-top: 30px; animation: floatUI 3s infinite ease-in-out; }
    @keyframes floatUI { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    
    .profile-pic { width: clamp(250px, 30vw, 400px); height: clamp(250px, 30vw, 400px); border-radius: 50%; border: 10px solid #fff; outline: 5px solid #000; object-fit: cover; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    
    .balloon { position: absolute; width: clamp(60px, 8vw, 90px); animation: bFloat 4s infinite ease-in-out; }
    .b1 { top: -20px; left: -40px; }
    .b2 { bottom: 20px; right: -40px; animation-delay: 1.5s; }
    @keyframes bFloat { 0%, 100% { transform: scale(1) rotate(5deg); } 50% { transform: scale(1.1) rotate(-5deg) translateY(-25px); } }

    /* BIG MewMew Restore */
    .mewmew { position: absolute; bottom: 10px; left: 10px; width: clamp(250px, 35vw, 450px); z-index: 10; pointer-events: none; }

    #start-btn { background: #ff4d6d; color: #fff; padding: 20px 50px; margin-top: 30px; border-radius: 50px; border: 5px solid #000; font-size: clamp(1.2rem, 3vw, 1.8rem); cursor: pointer; box-shadow: 0 8px 0 #000; z-index: 100; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
    #start-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #000; }

    /* BG Elements */
    .bg-heart { position: absolute; color: #ff7882; opacity: 0.5; pointer-events: none; animation: flyUp 7s linear infinite; }
    @keyframes flyUp { from { transform: translateY(110vh) rotate(0deg); } to { transform: translateY(-10vh) rotate(360deg); } }

    .letter-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; z-index: 600; align-items: center; justify-content: center; }
    .letter-card { background: #fff; width: 90%; max-width: 550px; padding: 40px; border-radius: 30px; border: 6px solid #000; text-align: center; box-shadow: 15px 15px 0 #FF1493; }
  </style>
</head>
<body>

  <div id="wrapper">
    <img src="https://i.postimg.cc/prVCTcnf/decorate.png" class="decorate-top">
    
    <div class="main-container">
      <div class="left-content">
        <div style="position:relative;">
          <img src="https://i.postimg.cc/NFGDMCr8/hat.png" class="hat">
          <div id="h-anim" class="happy"></div>
          <div id="b-anim" class="birthday"></div>
        </div>
        <div id="r-anim" class="name-radha"></div>
        <button id="start-btn">Start Surprise 🎁 ✨</button>
      </div>

      <div class="right-content">
        <div class="image-wrap">
          <img src="https://i.postimg.cc/Gt3K2gsz/img.png" class="profile-pic">
          <img src="https://i.postimg.cc/XqNLJ1yr/balloon1.png" class="balloon b1">
          <img src="https://i.postimg.cc/qqBwRDCG/balloon2.png" class="balloon b2">
        </div>
      </div>
    </div>

    <img src="https://i.postimg.cc/x8sRbGKG/mewmew.gif" class="mewmew">

    <div class="letter-popup">
      <div class="letter-card">
        <h2 id="lTitle" style="color: #ff4d6d; font-size: 2.5rem;"></h2>
        <p id="lText" style="margin-top: 20px; font-family: 'Dancing Script'; font-size: 2.2rem; line-height: 1.4; color: #333;"></p>
        <button onclick="location.reload()" style="margin-top:30px; padding:12px 30px; background:#000; color:#fff; border-radius:10px; cursor:pointer;">Watch Again ❤️</button>
      </div>
    </div>
  </div>

  <script>
    // 1. Music Synthesizer Logic
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playNote(freq, start, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.2, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(start);
        osc.stop(start + duration);
    }

    function playTune() {
        const notes = [261, 261, 293, 261, 349, 329, 261, 261, 293, 261, 392, 349];
        let time = audioCtx.currentTime;
        notes.forEach(n => { playNote(n, time, 0.5); time += 0.6; });
        setTimeout(playTune, 8000); 
    }

    // 2. Text Logic
    function runText() {
        const create = (id, txt, del) => {
            const container = document.getElementById(id);
            txt.split('').forEach((c, i) => {
                const s = document.createElement('span');
                s.textContent = c === ' ' ? '\u00A0' : c;
                s.style.animationDelay = (del + (i * 0.1)) + 's';
                container.appendChild(s);
            });
        };
        create('h-anim', 'Happy', 0.5); create('b-anim', 'Birthday', 1.2); create('r-anim', 'Radha', 2.0);
    }
    runText();

    // 3. Heart Shower
    function spawnHearts() {
        let h = $('<div class="bg-heart">❤️</div>');
        h.css({ left: Math.random()*100+'vw', fontSize: (Math.random()*20+20)+'px' });
        $('#wrapper').append(h);
        setTimeout(() => h.remove(), 7000);
    }
    setInterval(spawnHearts, 500);

    // 4. Click Event
    $("#start-btn").click(function(){
        audioCtx.resume();
        playTune();
        $(this).fadeOut();
        confetti({ particleCount: 250, spread: 100, origin: { y: 0.6 } });
        setTimeout(() => { $(".letter-popup").fadeIn().css("display", "flex"); type(); }, 1500);
    });

    function type() {
        let t = "Happy Birthday Radha! 🎂";
        let b = "May your life be as sweet and beautiful as your smile. You deserve all the happiness in the world! ❤️✨";
        let i=0, j=0;
        let tI = setInterval(() => { if(i < t.length) $("#lTitle").append(t[i++]); else clearInterval(tI); }, 50);
        setTimeout(() => { let bI = setInterval(() => { if(j < b.length) $("#lText").append(b[j++]); else clearInterval(bI); }, 40); }, 1200);
    }

    // Mouse Trail
    $(document).on('mousemove', function(e){
        if(Math.random() > 0.1) return;
        let h = $('<img src="https://i.postimg.cc/x8j5Cpbt/heart.png" style="width:20px; position:fixed; pointer-events:none; z-index:1000;">');
        h.css({left: e.clientX, top: e.clientY});
        $('body').append(h);
        h.animate({top: e.clientY - 100, opacity: 0}, 1000, () => h.remove());
    });
  </script>
</body>
</html>
